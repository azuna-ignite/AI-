name: ツールのアップデート情報を自動取得

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日 UTC 00:00（JST 09:00）
  workflow_dispatch:        # GitHub UI から手動実行も可能

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存パッケージをインストール
        run: npm ci

      - name: RSSフィードを取得
        run: node scripts/fetch-updates.js

      - name: updates.json をコミット・プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/updates.json
          git diff --staged --quiet \
            || git commit -m "chore: ツールのアップデート情報を更新 [$(date '+%Y-%m-%d')]"
          git push
