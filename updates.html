<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>更新情報 — Writing KB</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .update-meta {
      font-size: 0.8rem;
      color: var(--color-muted);
      margin-bottom: 2rem;
    }

    .updates-group {
      margin-bottom: 2.5rem;
    }

    .updates-group-heading {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--color-border);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .updates-group-heading .group-icon {
      font-size: 1rem;
    }

    .update-grid {
      display: grid;
      gap: 1rem;
    }

    .update-tool-section {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .update-tool-header {
      padding: 0.75rem 1.25rem;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .update-tool-header h3 {
      font-size: 0.93rem;
      font-weight: 700;
      margin: 0;
    }

    .update-items {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .update-item {
      padding: 0.7rem 1.25rem;
      border-bottom: 1px solid var(--color-border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.5rem;
      align-items: start;
    }

    .update-item:last-child {
      border-bottom: none;
    }

    .update-item a {
      color: var(--color-text);
      text-decoration: none;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .update-item a:hover {
      color: var(--color-primary);
      text-decoration: underline;
    }

    .update-item-date {
      font-size: 0.78rem;
      color: var(--color-muted);
      white-space: nowrap;
      padding-top: 0.15rem;
    }

    .loading-msg {
      text-align: center;
      padding: 3rem;
      color: var(--color-muted);
    }
  </style>
</head>
<body>

<header>
  <div class="nav-inner">
    <a href="index.html" class="site-title">✍️ Writing KB</a>
    <nav>
      <a href="index.html">ホーム</a>
      <a href="glossary.html">用語集</a>
      <a href="tips.html">Tips</a>
      <a href="basics.html">基礎知識</a>
      <a href="tools.html">ツール</a>
      <a href="updates.html">更新情報</a>
    </nav>
  </div>
</header>

<main>
  <h1 class="page-title">更新情報</h1>
  <p class="page-subtitle">ツール公式・メディア・YouTubeの最新情報を毎朝9時に自動取得しています。</p>

  <p id="updateMeta" class="update-meta"></p>

  <div id="updateRoot">
    <p class="loading-msg">読み込み中...</p>
  </div>
</main>

<footer>
  <p>Writing KB — ライターの学びの記録</p>
</footer>

<script>
  // ナビハイライト
  const current = location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('nav a').forEach(a => {
    if (a.getAttribute('href') === current) a.classList.add('active');
  });

  const SOURCE_GROUPS = [
    { key: 'tool',    label: 'ツール公式',  icon: '🛠️' },
    { key: 'media',   label: 'メディア記事', icon: '📰' },
    { key: 'youtube', label: 'YouTube',      icon: '▶️' },
  ];

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d)) return dateStr.slice(0, 10);
    return d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function renderAll(tools) {
    const root = document.getElementById('updateRoot');
    let html = '';

    SOURCE_GROUPS.forEach(({ key, label, icon }) => {
      const group = tools.filter(t => t.sourceType === key && t.items && t.items.length > 0);
      if (group.length === 0) return;

      html += `
        <div class="updates-group">
          <h2 class="updates-group-heading">
            <span class="group-icon">${icon}</span>${label}
          </h2>
          <div class="update-grid">
            ${group.map(tool => `
              <div class="update-tool-section">
                <div class="update-tool-header">
                  <h3>${tool.tool}</h3>
                </div>
                <ul class="update-items">
                  ${tool.items.map(item => `
                    <li class="update-item">
                      <a href="${item.link}" target="_blank" rel="noopener">${item.title}</a>
                      <span class="update-item-date">${formatDate(item.date)}</span>
                    </li>`).join('')}
                </ul>
              </div>`).join('')}
          </div>
        </div>`;
    });

    root.innerHTML = html || '<p class="loading-msg">まだデータが取得されていません。</p>';
  }

  fetch('data/updates.json')
    .then(r => r.json())
    .then(data => {
      const tools = data.tools || [];

      const meta = document.getElementById('updateMeta');
      meta.textContent = data.fetchedAt
        ? `最終取得: ${formatDate(data.fetchedAt)}`
        : 'まだデータが取得されていません。GitHub Actions を手動実行してください。';

      renderAll(tools);
    })
    .catch(() => {
      document.getElementById('updateRoot').innerHTML =
        '<p class="loading-msg">データの読み込みに失敗しました。</p>';
    });
</script>
</body>
</html>
